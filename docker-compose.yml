services:
  db:
    image: postgres:16
    container_name: taskmarket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskmarket
      POSTGRES_PASSWORD: taskmarket
      POSTGRES_DB: taskmarket
    ports:
      - "5432:5432"
    volumes:
      - taskmarket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmarket -d taskmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskmarket_pgdata:
